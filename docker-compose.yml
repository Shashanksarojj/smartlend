services:

  # ─── Microservices ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartlend-redis
    ports:
      - "6379:6379"

  user-service:
    build: ./user-service
    container_name: smartlend-user-service
    ports:
      - "8081:8081"
    depends_on:
      - redis
    environment:
      USER_DB_URL: ${USER_DB_URL}
      USER_DB_USERNAME: ${USER_DB_USERNAME}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: default
      REDIS_PASSWORD: ""
      REDIS_SSL: "false"
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5671}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_SSL: ${RABBITMQ_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:-smartlend-super-secret-jwt-key-change-in-prod}

  loan-service:
    build: ./loan-service
    container_name: smartlend-loan-service
    ports:
      - "8082:8082"
    environment:
      LOAN_DB_URL: ${LOAN_DB_URL}
      LOAN_DB_USERNAME: ${LOAN_DB_USERNAME}
      LOAN_DB_PASSWORD: ${LOAN_DB_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5671}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_SSL: ${RABBITMQ_SSL:-true}
      AI_SCORING_URL: http://ai-scoring:8000
      USER_SERVICE_URL: http://user-service:8081
      JWT_SECRET: ${JWT_SECRET:-smartlend-super-secret-jwt-key-change-in-prod}
      # LocalStack — host.docker.internal so containers can reach LocalStack on the host
      AWS_ENDPOINT: http://host.docker.internal:4566
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-smartlend-documents}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    depends_on:
      - ai-scoring
      - user-service

  notification-service:
    build: ./notification-service
    container_name: smartlend-notification-service
    ports:
      - "8083:8083"
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5671}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_SSL: ${RABBITMQ_SSL:-true}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@smartlend.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-SmartLend}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-true}
      NOTIFICATION_SMS_ENABLED: ${NOTIFICATION_SMS_ENABLED:-false}
      NOTIFICATION_PUSH_ENABLED: ${NOTIFICATION_PUSH_ENABLED:-false}
      NOTIFICATION_WHATSAPP_ENABLED: ${NOTIFICATION_WHATSAPP_ENABLED:-false}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-smartlend-webhook-secret}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v19.0}
      WHATSAPP_LANGUAGE_CODE: ${WHATSAPP_LANGUAGE_CODE:-en}
      WHATSAPP_TEMPLATE_LOAN_APPROVED: ${WHATSAPP_TEMPLATE_LOAN_APPROVED:-loan_approved}
      WHATSAPP_TEMPLATE_LOAN_REJECTED: ${WHATSAPP_TEMPLATE_LOAN_REJECTED:-loan_rejected}
      WHATSAPP_TEMPLATE_EMI_DUE: ${WHATSAPP_TEMPLATE_EMI_DUE:-emi_due}

  ai-scoring:
    build: ./ai-scoring
    container_name: smartlend-ai-scoring
    ports:
      - "8000:8000"

  # ─── Monitoring ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: smartlend-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml