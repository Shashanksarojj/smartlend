services:

  # ─── Databases ───────────────────────────────────────────────
  user-db:
    image: postgres:15-alpine
    container_name: smartlend-user-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: smartlend
      POSTGRES_PASSWORD: smartlend123
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data

  loan-db:
    image: postgres:15-alpine
    container_name: smartlend-loan-db
    environment:
      POSTGRES_DB: loandb
      POSTGRES_USER: smartlend
      POSTGRES_PASSWORD: smartlend123
    ports:
      - "5433:5432"
    volumes:
      - loan-db-data:/var/lib/postgresql/data

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartlend-redis
    ports:
      - "6379:6379"

  # ─── RabbitMQ ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smartlend-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: smartlend
      RABBITMQ_DEFAULT_PASS: smartlend123
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI at http://localhost:15672

  # ─── Microservices ───────────────────────────────────────────
  user-service:
    build: ./user-service
    container_name: smartlend-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/userdb
      SPRING_DATASOURCE_USERNAME: smartlend
      SPRING_DATASOURCE_PASSWORD: smartlend123
      SPRING_REDIS_HOST: redis
      JWT_SECRET: smartlend-super-secret-jwt-key-change-in-prod
    depends_on:
      - user-db
      - redis

  loan-service:
    build: ./loan-service
    container_name: smartlend-loan-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://loan-db:5432/loandb
      SPRING_DATASOURCE_USERNAME: smartlend
      SPRING_DATASOURCE_PASSWORD: smartlend123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: smartlend
      SPRING_RABBITMQ_PASSWORD: smartlend123
      AI_SCORING_URL: http://ai-scoring:8000
      USER_SERVICE_URL: http://user-service:8081
      JWT_SECRET: smartlend-super-secret-jwt-key-change-in-prod
    depends_on:
      - loan-db
      - rabbitmq
      - ai-scoring
      - user-service

  notification-service:
    build: ./notification-service
    container_name: smartlend-notification-service
    ports:
      - "8083:8083"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: smartlend
      SPRING_RABBITMQ_PASSWORD: smartlend123
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@smartlend.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-SmartLend}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-true}
      NOTIFICATION_SMS_ENABLED: ${NOTIFICATION_SMS_ENABLED:-false}
      NOTIFICATION_PUSH_ENABLED: ${NOTIFICATION_PUSH_ENABLED:-false}
      NOTIFICATION_WHATSAPP_ENABLED: ${NOTIFICATION_WHATSAPP_ENABLED:-false}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-smartlend-webhook-secret}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v19.0}
      WHATSAPP_LANGUAGE_CODE: ${WHATSAPP_LANGUAGE_CODE:-en}
      WHATSAPP_TEMPLATE_LOAN_APPROVED: ${WHATSAPP_TEMPLATE_LOAN_APPROVED:-loan_approved}
      WHATSAPP_TEMPLATE_LOAN_REJECTED: ${WHATSAPP_TEMPLATE_LOAN_REJECTED:-loan_rejected}
      WHATSAPP_TEMPLATE_EMI_DUE: ${WHATSAPP_TEMPLATE_EMI_DUE:-emi_due}
    depends_on:
      - rabbitmq

  ai-scoring:
    build: ./ai-scoring
    container_name: smartlend-ai-scoring
    ports:
      - "8000:8000"

  # ─── Monitoring ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: smartlend-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  user-db-data:
  loan-db-data:
