server:
  port: 8082

spring:
  application:
    name: loan-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/loandb}
    username: ${SPRING_DATASOURCE_USERNAME:smartlend}
    password: ${SPRING_DATASOURCE_PASSWORD:smartlend123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:smartlend}
    password: ${SPRING_RABBITMQ_PASSWORD:smartlend123}

jwt:
  secret: ${JWT_SECRET:smartlend-super-secret-jwt-key-change-in-prod}

services:
  ai-scoring-url: ${AI_SCORING_URL:http://localhost:8000}
  user-service-url: ${USER_SERVICE_URL:http://localhost:8081}

rabbitmq:
  exchange: smartlend.exchange
  queue:
    loan-events: loan.events.queue
  routing-key:
    loan-approved: loan.approved
    loan-rejected: loan.rejected
    emi-due: loan.emi.due

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
