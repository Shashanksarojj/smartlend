server:
  port: 8082

spring:
  application:
    name: loan-service

  datasource:
    url: ${LOAN_DB_URL:jdbc:postgresql://localhost:5433/loandb}
    username: ${LOAN_DB_USERNAME:smartlend}
    password: ${LOAN_DB_PASSWORD:smartlend123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smartlend}
    password: ${RABBITMQ_PASSWORD:smartlend123}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL:false}

  # Allow KYC documents up to 10 MB per file
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

jwt:
  secret: ${JWT_SECRET:smartlend-super-secret-jwt-key-change-in-prod}

services:
  ai-scoring-url: ${AI_SCORING_URL:http://localhost:8000}
  user-service-url: ${USER_SERVICE_URL:http://localhost:8081}

rabbitmq:
  exchange: smartlend.exchange
  queue:
    loan-events: loan.events.queue
  routing-key:
    loan-approved: loan.approved
    loan-rejected: loan.rejected
    loan-applied: loan.applied
    user-registered: user.registered
    emi-due: loan.emi.due

resilience4j:
  circuitbreaker:
    instances:
      ai-scoring:
        sliding-window-size: 10               # evaluate last 10 calls
        minimum-number-of-calls: 5            # need at least 5 before opening
        failure-rate-threshold: 50            # open if 50%+ of calls fail
        wait-duration-in-open-state: 30s      # stay open 30s before retrying
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.lang.Exception
      user-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s      # shorter — user profile is less critical
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.lang.Exception

# ── AWS / LocalStack S3 ────────────────────────────────────────
# Local dev: endpoint → LocalStack, credentials can be anything ("test" is LocalStack convention).
# Production (Railway): set AWS_S3_ENDPOINT="" and supply real IAM creds + bucket name.
aws:
  region: ${AWS_REGION:ap-south-1}
  endpoint: ${AWS_ENDPOINT:http://localhost:4566}   # shared LocalStack override; blank in production
  access-key: ${AWS_ACCESS_KEY_ID:test}
  secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  account-id: ${AWS_ACCOUNT_ID:000000000000}   # real 12-digit account ID on AWS; LocalStack default is 000000000000
  s3:
    bucket-name: ${AWS_S3_BUCKET:smartlend-documents}
    presigned-url-expiry-minutes: ${AWS_S3_PRESIGNED_EXPIRY:15}
  dynamodb:
    table-name: ${AWS_DYNAMODB_AUDIT_TABLE:loan-audit-log}
  sqs:
    enabled: ${AWS_SQS_ENABLED:false}
    queue-name: ${AWS_SQS_QUEUE:loan-events}
    queue-url: ${AWS_SQS_QUEUE_URL:http://localhost:4566/000000000000/loan-events}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    circuitbreakers:
      enabled: true
