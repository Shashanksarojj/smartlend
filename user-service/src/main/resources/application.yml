server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${USER_DB_USERNAME:smartlend}
    password: ${USER_DB_PASSWORD:smartlend123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smartlend}
    password: ${RABBITMQ_PASSWORD:smartlend123}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL:false}

rabbitmq:
  exchange: smartlend.exchange
  routing-key:
    user-registered: user.registered

jwt:
  secret: ${JWT_SECRET:smartlend-super-secret-jwt-key-change-in-prod}
  expiration: 86400000   # 24 hours in ms

# Cookie flags — override in production (Railway) via env vars
app:
  cookie:
    secure: ${COOKIE_SECURE:false}        # true in prod (HTTPS only)
    same-site: ${COOKIE_SAME_SITE:Lax}   # None in prod (cross-site Vercel → Railway)

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
