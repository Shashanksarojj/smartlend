server:
  port: 8083

spring:
  application:
    name: notification-service

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smartlend}
    password: ${RABBITMQ_PASSWORD:smartlend123}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL:false}

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:test}
        secret-key: ${AWS_SECRET_ACCESS_KEY:test}
      sqs:
        endpoint: ${AWS_ENDPOINT:http://localhost:4566}
        enabled: ${AWS_SQS_ENABLED:false}

rabbitmq:
  exchange: smartlend.exchange
  queue:
    loan-events: loan.events.queue

# ── AWS / LocalStack SQS ───────────────────────────────────────
aws:
  region: ${AWS_REGION:ap-south-1}
  endpoint: ${AWS_ENDPOINT:http://localhost:4566}
  access-key: ${AWS_ACCESS_KEY_ID:test}
  secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  account-id: ${AWS_ACCOUNT_ID:000000000000}   # real 12-digit account ID on AWS; LocalStack default is 000000000000
  sqs:
    enabled: ${AWS_SQS_ENABLED:false}
    queue-name: ${AWS_SQS_QUEUE:loan-events}
    queue-url: ${AWS_SQS_QUEUE_URL:http://localhost:4566/000000000000/loan-events}

# ── Notification channels ──────────────────────────────────────
notification:
  channels:
    email:
      enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
    sms:
      enabled: ${NOTIFICATION_SMS_ENABLED:false}
    push:
      enabled: ${NOTIFICATION_PUSH_ENABLED:false}
    whatsapp:
      enabled: ${NOTIFICATION_WHATSAPP_ENABLED:false}

# ── SendGrid ───────────────────────────────────────────────────
sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@smartlend.com}
  from-name: ${SENDGRID_FROM_NAME:SmartLend}

# ── WhatsApp Cloud API ─────────────────────────────────────────
whatsapp:
  access-token: ${WHATSAPP_ACCESS_TOKEN:}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  api-version: ${WHATSAPP_API_VERSION:v19.0}
  language-code: ${WHATSAPP_LANGUAGE_CODE:en}
  webhook-verify-token: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:smartlend-webhook-secret}
  templates:
    loan-approved: ${WHATSAPP_TEMPLATE_LOAN_APPROVED:loan_approved}
    loan-rejected: ${WHATSAPP_TEMPLATE_LOAN_REJECTED:loan_rejected}
    emi-due: ${WHATSAPP_TEMPLATE_EMI_DUE:emi_due}

# ── Future: Twilio SMS ─────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

# ── Future: Firebase Push ──────────────────────────────────────
firebase:
  server-key: ${FIREBASE_SERVER_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
